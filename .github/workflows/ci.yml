name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-tk python3-pystray python3-pil python3-gi gir1.2-ayatanaappindicator3-0.1 x11-utils pulseaudio-utils xvfb

      - name: Read package version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest pystray Pillow

      - name: Run tests
        run: python -m pytest -q

      - name: Compile Python sources
        run: python -m compileall src scripts

      - name: CLI smoke tests
        run: |
          ./meeting-recorder --help
          ./meeting-recorder doctor || true
          ./meeting-recorder doctor --json || true
          ./meeting-recorder list --output-dir "$(mktemp -d)"

      - name: GUI startup smoke test under virtual display
        run: |
          timeout 8s xvfb-run -a ./meeting-recorder gui || code=$?
          if [ "${code:-0}" != "124" ]; then
            echo "Expected GUI to keep running until timeout; got exit code ${code:-0}" >&2
            exit "${code:-1}"
          fi

      - name: Build release assets
        run: python scripts/build_release_assets.py

      - name: Verify checksums
        run: cd dist && sha256sum -c SHA256SUMS

      - name: Smoke-test installed source package GUI under virtual display
        run: |
          TMP=$(mktemp -d)
          mkdir -p "$TMP/home"
          tar -xzf "dist/meeting-recorder-app-${{ steps.version.outputs.version }}-linux-source-installer.tar.gz" -C "$TMP"
          PREFIX="$TMP/prefix" HOME="$TMP/home" bash "$TMP/meeting-recorder-app-${{ steps.version.outputs.version }}/install.sh"
          xvfb-run -a env HOME="$TMP/home" "$TMP/prefix/bin/meeting-recorder" gui-screenshot --output "$TMP/meeting-recorder-gui.png"
          test -s "$TMP/meeting-recorder-gui.png"
          cp "$TMP/meeting-recorder-gui.png" "dist/meeting-recorder-gui-v${{ steps.version.outputs.version }}.png"
          timeout 8s xvfb-run -a env HOME="$TMP/home" "$TMP/prefix/bin/meeting-recorder" gui || code=$?
          if [ "${code:-0}" != "124" ]; then
            echo "Expected installed GUI to keep running until timeout; got exit code ${code:-0}" >&2
            exit "${code:-1}"
          fi

      - name: Upload GUI screenshot evidence
        uses: actions/upload-artifact@v4
        with:
          name: meeting-recorder-gui-v${{ steps.version.outputs.version }}
          path: dist/meeting-recorder-gui-v${{ steps.version.outputs.version }}.png
          if-no-files-found: error

      - name: Verify release evidence signoff artifact
        run: |
          test -s "docs/release-evidence/v${{ steps.version.outputs.version }}-signoff.md"
          grep -q "Engineer signoff" "docs/release-evidence/v${{ steps.version.outputs.version }}-signoff.md"
          grep -q "QA/research signoff" "docs/release-evidence/v${{ steps.version.outputs.version }}-signoff.md"

      - name: Inspect release archive
        run: |
          tar -tzf "dist/meeting-recorder-app-${{ steps.version.outputs.version }}-linux-source-installer.tar.gz" | sort | tee /tmp/archive-files.txt
          grep -q "meeting-recorder-app-${{ steps.version.outputs.version }}/install.sh" /tmp/archive-files.txt
          grep -q "meeting-recorder-app-${{ steps.version.outputs.version }}/uninstall.sh" /tmp/archive-files.txt
          grep -q "meeting-recorder-app-${{ steps.version.outputs.version }}/meeting-recorder.desktop" /tmp/archive-files.txt

      - name: Inspect Debian package when built
        run: |
          if [ -f "dist/meeting-recorder-app_${{ steps.version.outputs.version }}_all.deb" ]; then
            dpkg-deb --info "dist/meeting-recorder-app_${{ steps.version.outputs.version }}_all.deb"
            dpkg-deb --contents "dist/meeting-recorder-app_${{ steps.version.outputs.version }}_all.deb" | grep '/usr/bin/meeting-recorder'
          fi
